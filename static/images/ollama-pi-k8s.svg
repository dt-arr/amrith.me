<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" width="512" height="512" role="img">
  <title>Ollama on Kubernetes-powered Raspberry Pi 5</title>
  <desc>Blog icon showing a Raspberry Pi 5 board running Kubernetes with Ollama local LLM inference</desc>

  <!-- Pi board outer rounded square (raspberry red) -->
  <rect x="100" y="100" width="480" height="480" rx="80" fill="#C51A4A"/>

  <!-- Inner board recess -->
  <rect x="148" y="148" width="384" height="384" rx="56" fill="#A0153E"/>

  <!-- PCB surface -->
  <rect x="192" y="192" width="296" height="296" rx="16" fill="#1a1a2e"/>
  <rect x="196" y="196" width="288" height="288" rx="14" fill="#16213e"/>

  <!-- Corner mounting holes -->
  <circle cx="208" cy="208" r="10" fill="#2a9d8f" opacity="0.9"/>
  <circle cx="472" cy="208" r="10" fill="#2a9d8f" opacity="0.9"/>
  <circle cx="208" cy="472" r="10" fill="#2a9d8f" opacity="0.9"/>
  <circle cx="472" cy="472" r="10" fill="#2a9d8f" opacity="0.9"/>

  <!-- PCB trace lines -->
  <rect x="220" y="196" width="240" height="4" rx="2" fill="#0f3460" opacity="0.7"/>
  <rect x="220" y="480" width="240" height="4" rx="2" fill="#0f3460" opacity="0.7"/>
  <rect x="196" y="220" width="4" height="240" rx="2" fill="#0f3460" opacity="0.7"/>
  <rect x="480" y="220" width="4" height="240" rx="2" fill="#0f3460" opacity="0.7"/>

  <!-- Kubernetes chip -->
  <rect x="224" y="232" width="232" height="100" rx="10" fill="#0d1b2a" stroke="#326CE5" stroke-width="1.5"/>

  <!-- K8s wheel logo -->
  <g transform="translate(244,252)">
    <circle cx="0" cy="18" r="18" fill="#326CE5"/>
    <circle cx="0" cy="0" r="3.5" fill="white"/>
    <circle cx="0" cy="36" r="3.5" fill="white"/>
    <circle cx="17" cy="-10.4" r="3.5" fill="white"/>
    <circle cx="-17" cy="-10.4" r="3.5" fill="white"/>
    <circle cx="17" cy="46.4" r="3.5" fill="white"/>
    <circle cx="-17" cy="46.4" r="3.5" fill="white"/>
    <line x1="0" y1="3.5" x2="0" y2="14.5" stroke="white" stroke-width="2"/>
    <line x1="0" y1="21.5" x2="0" y2="32.5" stroke="white" stroke-width="2"/>
    <line x1="3" y1="-1.7" x2="13" y2="-7.7" stroke="white" stroke-width="2"/>
    <line x1="-3" y1="-1.7" x2="-13" y2="-7.7" stroke="white" stroke-width="2"/>
    <line x1="3" y1="37.7" x2="13" y2="43.7" stroke="white" stroke-width="2"/>
    <line x1="-3" y1="37.7" x2="-13" y2="43.7" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="18" r="9" fill="#326CE5" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="18" r="5" fill="white"/>
  </g>

  <!-- K8s label -->
  <text x="282" y="264" font-family="monospace" font-size="11" fill="#326CE5" font-weight="700" letter-spacing="1">K8s</text>
  <text x="282" y="282" font-family="monospace" font-size="14" fill="white" font-weight="700">Kubernetes</text>
  <text x="282" y="298" font-family="monospace" font-size="9" fill="#7ecfff" opacity="0.8">orchestrating</text>
  <text x="282" y="312" font-family="monospace" font-size="9" fill="#7ecfff" opacity="0.8">ai namespace</text>

  <!-- Ollama chip -->
  <rect x="224" y="348" width="232" height="84" rx="10" fill="#0d1b2a" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Ollama llama logo (simplified) -->
  <g transform="translate(242,362)">
    <rect x="0" y="0" width="52" height="52" rx="10" fill="#1a1a1a"/>
    <ellipse cx="26" cy="24" rx="18" ry="14" fill="#f5f5f0"/>
    <ellipse cx="26" cy="21" rx="11" ry="9" fill="#1a1a1a"/>
    <ellipse cx="26" cy="21" rx="7" ry="6" fill="#f5f5f0"/>
    <ellipse cx="22" cy="37" rx="5" ry="3" fill="#f5f5f0"/>
    <ellipse cx="30" cy="37" rx="5" ry="3" fill="#f5f5f0"/>
    <line x1="22" y1="33" x2="22" y2="40" stroke="#f5f5f0" stroke-width="2"/>
    <line x1="30" y1="33" x2="30" y2="40" stroke="#f5f5f0" stroke-width="2"/>
  </g>

  <!-- Ollama label -->
  <text x="304" y="376" font-family="monospace" font-size="16" fill="white" font-weight="700">Ollama</text>
  <text x="304" y="394" font-family="monospace" font-size="9" fill="#aaaaaa" opacity="0.9">qwen2.5:1.5b</text>
  <text x="304" y="408" font-family="monospace" font-size="9" fill="#aaaaaa" opacity="0.9">1.5B · local inference</text>

  <!-- Board label -->
  <text x="340" y="458" font-family="monospace" font-size="9" fill="#e07b54" font-weight="600" text-anchor="middle" letter-spacing="2">RASPBERRY Pi 5 · 8GB</text>

  <!-- GPIO pins left -->
  <rect x="152" y="270" width="36" height="8" rx="4" fill="#ffd700" opacity="0.9"/>
  <rect x="152" y="290" width="36" height="8" rx="4" fill="#ffd700" opacity="0.9"/>
  <rect x="152" y="310" width="36" height="8" rx="4" fill="#ffd700" opacity="0.9"/>

  <!-- GPIO pins right -->
  <rect x="492" y="270" width="36" height="8" rx="4" fill="#ffd700" opacity="0.9"/>
  <rect x="492" y="290" width="36" height="8" rx="4" fill="#ffd700" opacity="0.9"/>
  <rect x="492" y="310" width="36" height="8" rx="4" fill="#ffd700" opacity="0.9"/>

  <!-- USB ports top -->
  <rect x="280" y="152" width="40" height="40" rx="6" fill="#888888" opacity="0.7"/>
  <rect x="360" y="152" width="40" height="40" rx="6" fill="#888888" opacity="0.7"/>

  <!-- USB ports bottom -->
  <rect x="280" y="488" width="40" height="12" rx="3" fill="#555555" opacity="0.6"/>
  <rect x="360" y="488" width="40" height="12" rx="3" fill="#555555" opacity="0.6"/>
</svg>
